<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦍 Workout Tracker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap');

:root {
  --bg: #111;
  --surface: #1a1a1a;
  --card: #202020;
  --border: #2e2e2e;
  --border2: #3a3a3a;
  --text: #f0ede8;
  --muted: #6b6560;
  --muted2: #888;
  --accent: #e8c84a;
  --accent-dim: #b09a35;
  --d1: #4a9fe8;
  --d2: #4ae87a;
  --d3: #e84a4a;
  --d4: #a04ae8;
  --opt: #999;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Barlow', sans-serif;
  font-weight: 400;
  min-height: 100vh;
}

/* ─── HEADER ─── */
.app-header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  height: 56px;
  position: sticky;
  top: 0;
  z-index: 50;
}
.app-logo {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: 20px;
  letter-spacing: 0.04em;
  color: var(--accent);
  text-transform: uppercase;
}
.app-logo span { color: var(--muted2); font-weight: 400; }
.header-sep { flex: 1; }
.week-badge {
  background: var(--border);
  border-radius: 6px;
  padding: 4px 10px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.08em;
  color: var(--muted2);
  text-transform: uppercase;
}
.btn-save-notion {
  background: var(--accent);
  color: #111;
  border: none;
  border-radius: 7px;
  padding: 7px 14px;
  font-family: 'Barlow', sans-serif;
  font-weight: 600;
  font-size: 13px;
  cursor: pointer;
  letter-spacing: 0.04em;
  transition: all 0.15s;
}
.btn-save-notion:hover { background: #f0d45a; }
.btn-save-notion:active { transform: scale(0.97); }
.btn-save-notion.saving { opacity: 0.6; pointer-events: none; }

/* ─── WEEK / DAY NAV ─── */
.nav-strip {
  display: flex;
  gap: 0;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  scrollbar-width: none;
}
.nav-strip::-webkit-scrollbar { display: none; }

.week-group { display: flex; flex-direction: column; }

.week-tab {
  padding: 8px 16px 6px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  border-right: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
  border-bottom: 2px solid transparent;
}
.week-tab:hover { color: var(--text); background: var(--border); }
.week-tab.active { color: var(--accent); border-bottom-color: var(--accent); background: rgba(232,200,74,0.05); }

.day-tabs {
  display: flex;
  gap: 2px;
  padding: 6px 8px;
  border-right: 1px solid var(--border);
}
.day-tab {
  padding: 4px 10px;
  border-radius: 5px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  border: 1px solid transparent;
  white-space: nowrap;
  color: var(--muted2);
}
.day-tab:hover { background: var(--border); color: var(--text); }
.day-tab.active { border-color: var(--border2); color: var(--text); background: var(--card); }
.day-tab[data-day="1"].active { color: var(--d1); border-color: var(--d1); }
.day-tab[data-day="2"].active { color: var(--d2); border-color: var(--d2); }
.day-tab[data-day="3"].active { color: var(--d3); border-color: var(--d3); }
.day-tab[data-day="4"].active { color: var(--d4); border-color: var(--d4); }

/* ─── MAIN CONTENT ─── */
.main {
  max-width: 840px;
  margin: 0 auto;
  padding: 24px 16px 80px;
}

/* ─── DAY HEADER ─── */
.day-header {
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin-bottom: 20px;
}
.day-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 28px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.day-title.d1 { color: var(--d1); }
.day-title.d2 { color: var(--d2); }
.day-title.d3 { color: var(--d3); }
.day-title.d4 { color: var(--d4); }
.day-title.dopt { color: var(--opt); }
.day-subtitle {
  font-size: 14px;
  color: var(--muted2);
  font-weight: 500;
}

/* ─── EXERCISE CARD ─── */
.exercise-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 10px;
  overflow: hidden;
  transition: border-color 0.15s;
}
.exercise-card:focus-within { border-color: var(--border2); }

.ex-header {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: center;
  padding: 12px 14px 10px;
  gap: 8px;
}
.ex-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 16px;
  letter-spacing: 0.02em;
  text-transform: uppercase;
  color: var(--text);
}
.ex-name.gvt { color: var(--accent); }
.ex-target {
  font-size: 12px;
  color: var(--muted);
  font-weight: 500;
  background: var(--border);
  padding: 2px 8px;
  border-radius: 4px;
  white-space: nowrap;
}

/* ─── SET INPUTS ─── */
.sets-row {
  display: flex;
  gap: 6px;
  padding: 0 14px 12px;
  flex-wrap: wrap;
}

.set-block {
  display: flex;
  flex-direction: column;
  gap: 4px;
  min-width: 80px;
  flex: 1;
}
.set-label {
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--muted);
  text-transform: uppercase;
  font-weight: 600;
}
.set-inputs {
  display: flex;
  gap: 2px;
}
.set-input {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 5px;
  color: var(--text);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 17px;
  font-weight: 600;
  text-align: center;
  padding: 6px 4px;
  min-width: 0;
  transition: border-color 0.15s;
  -moz-appearance: textfield;
}
.set-input::-webkit-outer-spin-button,
.set-input::-webkit-inner-spin-button { -webkit-appearance: none; }
.set-input:focus {
  outline: none;
  border-color: var(--accent);
  background: #252520;
}
.set-input::placeholder { color: var(--muted); opacity: 0.5; }
.set-input.filled { border-color: var(--border2); color: var(--text); }

.set-sep {
  display: flex;
  align-items: center;
  color: var(--muted);
  font-size: 13px;
  padding: 0 1px;
  padding-top: 4px;
}

/* notes field */
.ex-notes-row {
  padding: 0 14px 12px;
}
.ex-notes {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 5px;
  color: var(--muted2);
  font-family: 'Barlow', sans-serif;
  font-size: 12px;
  padding: 6px 10px;
  resize: none;
  min-height: 0;
  height: 30px;
  transition: all 0.15s;
}
.ex-notes:focus {
  outline: none;
  border-color: var(--border2);
  color: var(--text);
  height: 52px;
}

/* ─── SECTION LABELS ─── */
.section-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--muted);
  margin: 20px 0 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ─── WEEK CHECK-IN ─── */
.checkin-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
  margin-top: 24px;
}
.checkin-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: 15px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted2);
  margin-bottom: 14px;
}
.checkin-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.checkin-field {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.checkin-field label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
}
.checkin-input {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 18px;
  font-weight: 600;
  padding: 7px 10px;
  transition: border-color 0.15s;
  -moz-appearance: textfield;
}
.checkin-input::-webkit-outer-spin-button,
.checkin-input::-webkit-inner-spin-button { -webkit-appearance: none; }
.checkin-input:focus { outline: none; border-color: var(--accent); }
.checkin-text {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-family: 'Barlow', sans-serif;
  font-size: 13px;
  padding: 7px 10px;
  resize: none;
  height: 68px;
  transition: border-color 0.15s;
  grid-column: 1 / -1;
}
.checkin-text:focus { outline: none; border-color: var(--accent); }
.checkin-checks {
  grid-column: 1 / -1;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.checkin-check {
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
}
.checkin-check input[type=checkbox] { display: none; }
.check-box {
  width: 18px;
  height: 18px;
  border: 1.5px solid var(--border2);
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 0.15s;
}
.checkin-check input:checked + .check-box {
  background: var(--accent);
  border-color: var(--accent);
}
.check-tick {
  font-size: 11px;
  color: #111;
  display: none;
  font-weight: 800;
}
.checkin-check input:checked + .check-box .check-tick { display: block; }
.check-label { font-size: 13px; color: var(--muted2); }

/* strength check */
.strength-grid {
  display: grid;
  grid-template-columns: 1fr auto auto auto;
  gap: 6px 10px;
  align-items: center;
  grid-column: 1 / -1;
  margin-top: 4px;
}
.str-ex { font-size: 13px; color: var(--muted2); }
.str-radio-group { display: flex; gap: 4px; }
.str-radio {
  width: 28px;
  height: 28px;
  border-radius: 5px;
  border: 1.5px solid var(--border2);
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.15s;
  background: transparent;
  color: var(--muted);
}
.str-radio.down.active { background: var(--d3); border-color: var(--d3); color: #fff; }
.str-radio.same.active { background: var(--border2); border-color: var(--border2); color: var(--text); }
.str-radio.up.active { background: var(--d2); border-color: var(--d2); color: #111; }

/* ─── TOAST ─── */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--accent);
  color: #111;
  font-family: 'Barlow', sans-serif;
  font-weight: 700;
  font-size: 14px;
  padding: 12px 20px;
  border-radius: 8px;
  transform: translateY(80px);
  opacity: 0;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  z-index: 200;
  pointer-events: none;
}
.toast.show { transform: translateY(0); opacity: 1; }

/* ─── EMPTY STATE ─── */
.empty-day {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
}
.empty-day h3 { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
.empty-day p { font-size: 14px; }

@media (max-width: 500px) {
  .set-block { min-width: 60px; }
  .ex-name { font-size: 14px; }
  .checkin-grid { grid-template-columns: 1fr; }
}
</style>
</head>

// ─── STATE ───────────────────────────────────────────────────
let state = {}; // state[weekId][dayId][exIndex] = { sets: [{w, r}, ...], notes: '' }
let currentWeek = 'w4';
let currentDay = 'd1';
let notionPageId = '32c47940c36e815cab96e27e28c57788';

function getKey(weekId, dayId, exIdx, setIdx) {
  return `${weekId}__${dayId}__${exIdx}__${setIdx}`;
}

function loadState() {
  const saved = localStorage.getItem('wt_state_v2');
  if (saved) { try { state = JSON.parse(saved); } catch(e) { state = {}; } }
}

function saveState() {
  localStorage.setItem('wt_state_v2', JSON.stringify(state));
}

function getExState(weekId, dayId, exIdx) {
  if (!state[weekId]) state[weekId] = {};
  if (!state[weekId][dayId]) state[weekId][dayId] = {};
  if (!state[weekId][dayId][exIdx]) state[weekId][dayId][exIdx] = { sets: [], notes: '' };
  return state[weekId][dayId][exIdx];
}

// ─── RENDER ──────────────────────────────────────────────────
function buildNav() {
  const nav = document.getElementById('weekNav');
  nav.innerHTML = '';
  WEEKS.forEach(week => {
    const col = document.createElement('div');
    col.style.display = 'flex';
    col.style.flexDirection = 'column';
    col.style.borderRight = '1px solid var(--border)';

    const wt = document.createElement('div');
    wt.className = 'week-tab' + (week.id === currentWeek ? ' active' : '');
    wt.textContent = week.label + ' ' + week.status;
    wt.title = week.date;
    wt.onclick = () => { currentWeek = week.id; currentDay = week.days[0].id; buildNav(); renderDay(); };
    col.appendChild(wt);

    if (week.id === currentWeek) {
      const dayRow = document.createElement('div');
      dayRow.style.display = 'flex';
      dayRow.style.gap = '4px';
      dayRow.style.padding = '6px 8px';
      week.days.forEach(day => {
        const dt = document.createElement('div');
        dt.className = 'day-tab' + (day.id === currentDay ? ' active' : '');
        dt.dataset.day = day.id.replace('d','');
        dt.textContent = day.icon + ' ' + day.title;
        dt.onclick = () => { currentDay = day.id; buildNav(); renderDay(); };
        dayRow.appendChild(dt);
      });
      col.appendChild(dayRow);
    }

    nav.appendChild(col);
  });
}

function renderDay() {
  const week = WEEKS.find(w => w.id === currentWeek);
  const day = week?.days.find(d => d.id === currentDay);
  const main = document.getElementById('mainContent');
  const badge = document.getElementById('currentWeekBadge');

  }

  html += '<div class="section-label">Exercises</div>';

  day.exercises.forEach((ex, ei) => {
    const exState = getExState(currentWeek, currentDay, ei);

      <div class="ex-header">
        <div class="ex-name${isGvt ? ' gvt' : ''}">${isGvt ? '⚡ ' : ''}${ex.name}</div>
        <div class="ex-target">${ex.target}</div>
      </div>
      <div class="sets-row">`;

    const numSets = ex.sets || 3;

        <div class="set-label">Set ${s+1}${prevVal ? ` <span style="color:var(--muted);font-weight:400;font-size:9px;opacity:.6">${prevVal}</span>` : ''}</div>

          <input class="set-input${filled}" type="text" inputmode="decimal"

            data-week="${currentWeek}" data-day="${currentDay}" data-ex="${ei}" data-set="${s}" data-field="w"
            onchange="onSetChange(this)" oninput="onSetChange(this)">
          <span class="set-sep">×</span>

    <div class="checkin-card">
      <div class="checkin-title">📋 Week ${week.label.split(' ')[1]} Check-In</div>

        <div class="checkin-field">
          <label>Fasted Weight (kg)</label>

            value="${ci.weight || ''}"
            onchange="onCheckinChange(this, 'weight')" oninput="onCheckinChange(this, 'weight')">
        </div>

          <label>Weekly Average (kg)</label>
          <input type="number" class="checkin-input" step="0.1" placeholder="—"
            value="${ci.avgWeight || ''}"

        </div>

        <div class="strength-grid">
          <div style="font-size:11px;font-weight:700;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;">Strength</div>
          <div style="font-size:10px;color:var(--muted);text-align:center;">↓</div>

          <div style="font-size:10px;color:var(--muted);text-align:center;">↑</div>
          ${['Bench Press','Leg Press / RDL','Row / Pulldown'].map((ex,i) => `
          <div class="str-ex">${ex}</div>
          ${['down','same','up'].map(dir => `
          <div class="str-radio-group">
            <div class="str-radio ${dir} ${ci.strength?.[i] === dir ? 'active' : ''}"
              onclick="onStrengthChange(${i}, '${dir}', this)">${dir==='down'?'↓':dir==='same'?'→':'↑'}</div>

            {key:'protein',label:'Protein 160–180g/day'},

            {key:'sleep',label:'Sleep 7–8 hrs'},

          <label class="checkin-check">
            <input type="checkbox" ${ci[item.key] ? 'checked' : ''}
              onchange="onCheckinCheck(this, '${item.key}')">
            <div class="check-box"><span class="check-tick">✓</span></div>
            <span class="check-label">${item.label}</span>
          </label>`).join('')}
        </div>

        <div class="checkin-field" style="grid-column:1/-1">
          <label>Wins</label>
          <textarea class="checkin-text" placeholder="What went well..."
            onchange="onCheckinChange(this,'wins')" oninput="onCheckinChange(this,'wins')">${ci.wins||''}</textarea>
        </div>
        <div class="checkin-field" style="grid-column:1/-1">
          <label>Struggles / Notes</label>
          <textarea class="checkin-text" placeholder="What needs work, next week focus..."
            onchange="onCheckinChange(this,'struggles')" oninput="onCheckinChange(this,'struggles')">${ci.struggles||''}</textarea>
        </div>
      </div>

  }

  main.innerHTML = html;

// ─── STATE HANDLERS ─────────────────────────────────────────
function onSetChange(el) {
  const { week, day, ex, set: s, field } = el.dataset;
  const exState = getExState(week, day, parseInt(ex));
  if (!exState.sets[s]) exState.sets[s] = { w: '', r: '' };
  exState.sets[s][field] = el.value;
  el.classList.toggle('filled', !!el.value);
  saveState();
}

function onNotesChange(el) {
  const { week, day, ex } = el.dataset;
  const exState = getExState(week, day, parseInt(ex));
  exState.notes = el.value;
  saveState();
}

function getCheckinState(weekId) {
  if (!state['__checkin__']) state['__checkin__'] = {};
  if (!state['__checkin__'][weekId]) state['__checkin__'][weekId] = {};
  return state['__checkin__'][weekId];
}

function onCheckinChange(el, key) {
  const ci = getCheckinState(currentWeek);
  ci[key] = el.value;
  saveState();
}

function onCheckinCheck(el, key) {
  const ci = getCheckinState(currentWeek);
  ci[key] = el.checked;
  saveState();
}

function onStrengthChange(idx, dir, el) {
  const ci = getCheckinState(currentWeek);
  if (!ci.strength) ci.strength = [null, null, null];
  ci.strength[idx] = ci.strength[idx] === dir ? null : dir;
  saveState();
  // update UI
  const row = el.closest('.strength-grid');
  const allInRow = row.querySelectorAll(`.str-radio`);
  // re-render just the strength section
  renderDay();
}

// ─── SAVE TO NOTION ─────────────────────────────────────────
async function saveToNotion() {
  const btn = document.getElementById('saveBtn');
  btn.textContent = 'Saving...';
  btn.classList.add('saving');

  try {
    const week = WEEKS.find(w => w.id === currentWeek);
    const day = week.days.find(d => d.id === currentDay);
    const ci = getCheckinState(currentWeek);

    let content = `## ${week.label} — ${day.title}: ${day.sub}\n\n`;
    content += `**Logged:** ${new Date().toLocaleDateString('en-NZ', {weekday:'long',day:'numeric',month:'long'})}\n\n`;

    day.exercises.forEach((ex, ei) => {
      const exState = getExState(currentWeek, currentDay, ei);
      content += `**${ex.name}** (${ex.target})\n`;
      exState.sets.forEach((set, si) => {
        if (set.w || set.r) content += `  Set ${si+1}: ${set.w || '—'} kg × ${set.r || '—'} reps\n`;
      });
      if (exState.notes) content += `  Notes: ${exState.notes}\n`;
      content += '\n';
    });

    if (ci.weight) content += `\n**Weight:** ${ci.weight} kg`;
    if (ci.wins) content += `\n**Wins:** ${ci.wins}`;
    if (ci.struggles) content += `\n**Struggles:** ${ci.struggles}`;

    showToast('✅ Saved to Notion!');
  } catch (e) {
    showToast('❌ Save failed');
  }

  btn.textContent = 'Save to Notion';
  btn.classList.remove('saving');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}
